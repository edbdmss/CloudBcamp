apiVersion: v1                   
kind: Pod                        
metadata:
  name: web-pod
  labels:                        
    app: web
    tier: frontend
spec:
  containers:                    
  - name: nginx                  
    image: nginx:1.27
    ports:       
    - containerPort: 80
      name: http  
    resources:
      requests:   
        cpu: "100m"
        memory: "128Mi"
      limits:     
        cpu: "300m"
        memory: "256Mi"
    imagePullPolicy: IfNotPresent  