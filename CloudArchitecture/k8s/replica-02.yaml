apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: api-rs
  namespace: production
spec:
  replicas: 5
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [api, api-v2]
      - key: tier
        operator: NotIn
        values: [frontend]
      - key: environment
        operator: Exists
  template:
    metadata:
      labels:
        app: api
        tier: backend
        environment: production
        version: v1
    spec:
      containers:
        - name: app
          image: my-api:1.0
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5