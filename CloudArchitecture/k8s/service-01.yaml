apiVersion: v1
kind: Service
metadata:
  name: backend-internal
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  trafficDistribution: PreferClose
---
apiVersion: v1
kind: Service
metadata:
  name: backend-public
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30888
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - port: 3306
      name: mysql